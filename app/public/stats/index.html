<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>提案瀏覽統計｜e-life-ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4f7fb; --ink-0: #14233a; --ink-1: #41526b; --ink-2: #7b8aa3;
    --brand: #1f6feb; --brand-dark: #1559c4; --brand-soft: #e8f1ff;
    --mint: #34e3c4; --indigo: #7c8cff; --card: #fff; --line: #e3e9f2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink-0);
    font-family: "Noto Sans TC", system-ui, sans-serif;
    line-height: 1.6; padding: 32px 16px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    font-family: Sora, sans-serif; font-weight: 800; font-size: 20px;
  }
  .dot { width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(120deg, var(--mint), var(--indigo)); }
  h1 { font-family: Sora, sans-serif; font-size: 24px; margin: 0 0 4px; }
  .sub { color: var(--ink-2); margin: 0 0 24px; font-size: 14px; }
  .bar { display: flex; gap: 8px; margin-bottom: 24px; }
  input {
    flex: 1; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; font-family: "JetBrains Mono", monospace; color: var(--ink-0);
  }
  input:focus { outline: none; border-color: var(--brand); }
  button {
    padding: 12px 20px; border: 0; border-radius: 10px; cursor: pointer;
    background: var(--brand); color: #fff; font: inherit; font-weight: 700;
  }
  button:hover { background: var(--brand-dark); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 28px; box-shadow: 0 1px 3px rgba(20,35,58,.04);
  }
  .big { font-family: Sora, sans-serif; font-weight: 800; font-size: 56px;
    line-height: 1; color: var(--brand); margin: 4px 0 2px; }
  .big-label { color: var(--ink-2); font-size: 14px; }
  .meta { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line);
    color: var(--ink-1); font-size: 14px; }
  .meta b { color: var(--ink-0); }
  .hashline { font-family: "JetBrains Mono", monospace; font-size: 13px;
    color: var(--ink-2); word-break: break-all; }
  .list { margin-top: 16px; }
  .list h3 { font-size: 14px; color: var(--ink-1); margin: 0 0 8px; }
  .ts { font-family: "JetBrains Mono", monospace; font-size: 13px;
    color: var(--ink-1); padding: 5px 0; border-bottom: 1px dashed var(--line); }
  .ts:last-child { border-bottom: 0; }
  .empty { color: var(--ink-2); font-style: italic; }
  .err { color: #c0392b; }
  .hint { margin-top: 20px; color: var(--ink-2); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>e-life-ai</div>
  <h1>提案瀏覽統計</h1>
  <p class="sub">查看某份提案頁被開啟的次數與時間（台灣時間）。</p>

  <div class="bar">
    <input id="hash" placeholder="輸入提案 hash，例：fdfaa060df90" autocomplete="off" />
    <button id="go">查詢</button>
  </div>

  <div class="card" id="out">
    <p class="empty">輸入提案 hash 後按「查詢」，或在網址加 <code>?p=&lt;hash&gt;</code> 直接帶入。</p>
  </div>

  <p class="hint">資料僅記錄開啟次數與時間，不含任何個資（無 cookie／IP／來源）。本頁不對外公開索引。</p>
</div>

<script>
  var API = 'https://elife-ai-contact.digital-oasis-tw.workers.dev/track/stats';
  var out = document.getElementById('out');
  var input = document.getElementById('hash');

  function fmt(iso) {
    var d = new Date(iso);
    if (isNaN(d)) return iso;
    // 轉台灣時間 (UTC+8) 顯示
    var tw = new Date(d.getTime() + 8 * 3600 * 1000);
    var p = function (n) { return String(n).padStart(2, '0'); };
    return tw.getUTCFullYear() + '/' + p(tw.getUTCMonth() + 1) + '/' + p(tw.getUTCDate())
      + ' ' + p(tw.getUTCHours()) + ':' + p(tw.getUTCMinutes());
  }

  function render(d) {
    var recent = d.recent || [];
    var last = recent.length ? fmt(recent[0]) : '尚無紀錄';
    var rows = recent.length
      ? recent.map(function (t) { return '<div class="ts">' + fmt(t) + '</div>'; }).join('')
      : '<div class="empty">尚無開啟紀錄</div>';
    out.innerHTML =
      '<div class="big-label">總開啟次數</div>' +
      '<div class="big">' + (d.count || 0) + '</div>' +
      '<div class="meta">最近一次開啟：<b>' + last + '</b><br />' +
      '<span class="hashline">提案 hash：' + d.hash + '</span></div>' +
      '<div class="list"><h3>開啟時間紀錄（最近 ' + recent.length + ' 筆，台灣時間）</h3>' + rows + '</div>';
  }

  function query(hash) {
    hash = (hash || '').trim();
    if (!/^[0-9a-f]{12}$/.test(hash)) {
      out.innerHTML = '<p class="err">請輸入正確的 12 位提案 hash。</p>';
      return;
    }
    out.innerHTML = '<p class="empty">查詢中…</p>';
    fetch(API + '?p=' + hash)
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function () {
        out.innerHTML = '<p class="err">查詢失敗，請確認在 service.e-life-ai.com 網域下開啟本頁。</p>';
      });
  }

  document.getElementById('go').addEventListener('click', function () { query(input.value); });
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') query(input.value); });

  // 網址帶 ?p=<hash> 則自動查詢
  var p = new URLSearchParams(location.search).get('p');
  if (p) { input.value = p; query(p); }
</script>
</body>
</html>
