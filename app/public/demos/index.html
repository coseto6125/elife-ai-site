<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>設計風格範例集 — e-life-ai.com</title>
<meta name="description" content="e-life-ai.com 接案設計風格範例集：20 種不同產業與美學方向的網站樣板，純前端互動模擬。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b0f;
    --bg-1: #11131a;
    --bg-2: #161922;
    --line: rgba(255, 255, 255, 0.09);
    --line-bright: rgba(255, 255, 255, 0.22);
    --ink-0: #f4f6fb;
    --ink-1: #b9c0cf;
    --ink-2: #6f7689;
    --accent: #58e1c4;
    --accent-2: #7aa2ff;
    --radius: 16px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --font-display: 'Sora', 'Noto Sans TC', sans-serif;
    --font-body: 'Noto Sans TC', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink-1);
    font-family: var(--font-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(60% 50% at 15% 0%, rgba(88, 225, 196, 0.08), transparent 70%),
      radial-gradient(50% 50% at 90% 10%, rgba(122, 162, 255, 0.07), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 48px); position: relative; z-index: 1; }

  header.top { padding: clamp(56px, 9vw, 110px) 0 clamp(36px, 5vw, 60px); }
  .brandline { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
  .brand-dot { width: 11px; height: 11px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 0 18px rgba(88, 225, 196, 0.55); }
  .brand-name { font-family: var(--font-display); font-weight: 700; color: var(--ink-0); letter-spacing: -0.01em; }
  .brand-tag { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-2); }
  .eyebrow { font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
  h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(2.1rem, 5.5vw, 3.6rem);
    color: var(--ink-0);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 16px 0 18px;
  }
  .lead { max-width: 60ch; color: var(--ink-1); font-size: clamp(1rem, 1.5vw, 1.15rem); }
  .count { margin-top: 22px; font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink-2); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: clamp(16px, 2vw, 22px);
    padding-bottom: clamp(60px, 10vw, 120px);
  }
  .card {
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.4s var(--ease), transform 0.4s var(--ease), box-shadow 0.4s var(--ease);
    opacity: 0;
    transform: translateY(14px);
    animation: rise 0.6s var(--ease) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .card:hover { border-color: var(--line-bright); transform: translateY(-5px); box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4); }
  .thumb {
    aspect-ratio: 16 / 10;
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
    border-bottom: 1px solid var(--line);
  }
  .thumb-fallback {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    color: var(--ink-0);
    opacity: 0.9;
    text-align: center;
    padding: 16px;
  }
  .card-body { padding: 18px 20px 22px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .no { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent); letter-spacing: 0.06em; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 1.18rem; color: var(--ink-0); letter-spacing: -0.01em; }
  .desc { font-size: 0.9rem; color: var(--ink-2); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; padding-top: 12px; }
  .tag { font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink-1); background: rgba(255, 255, 255, 0.04); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
  .arrow { margin-top: 12px; font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent); }

  .empty { grid-column: 1 / -1; padding: 60px; text-align: center; color: var(--ink-2); border: 1px dashed var(--line); border-radius: var(--radius); }

  footer.bot { border-top: 1px solid var(--line); padding: 30px 0 60px; }
  footer.bot a { color: var(--accent); text-decoration: none; }
  .back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink-2); text-decoration: none; }
  .back:hover { color: var(--ink-0); }
</style>
</head>
<body>
  <header class="top">
    <div class="wrap">
      <div class="brandline">
        <span class="brand-dot"></span>
        <span class="brand-name">e-life-ai</span>
        <span class="brand-tag">e-life-ai.com</span>
      </div>
      <span class="eyebrow">// Design Showcase</span>
      <h1>20 種設計風格範例</h1>
      <p class="lead">
        針對不同產業與品牌調性，我們預先製作的網站樣板。每一個都是可互動的前端模擬，
        展示版面、動態與美學方向 —— 接案討論時，可直接挑一個當起點。
      </p>
      <p class="count" id="count"></p>
    </div>
  </header>

  <main class="wrap">
    <div class="grid" id="grid">
      <div class="empty">範例載入中…</div>
    </div>
  </main>

  <footer class="bot">
    <div class="wrap">
      <a class="back" href="/">← 回到 e-life-ai.com</a>
    </div>
  </footer>

  <script>
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');

    function card(d, i) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = `./${d.no}/`;
      a.style.animationDelay = `${Math.min(i * 45, 600)}ms`;
      const thumbStyle = d.accent
        ? `background: linear-gradient(135deg, ${d.accent[0]}, ${d.accent[1]});`
        : 'background: linear-gradient(135deg, #1b1f2b, #11131a);';
      const tags = (d.tags || []).map((t) => `<span class="tag">${t}</span>`).join('');
      a.innerHTML = `
        <div class="thumb" style="${thumbStyle}">
          <div class="thumb-fallback">${d.name}</div>
        </div>
        <div class="card-body">
          <span class="no">No. ${d.no}</span>
          <span class="name">${d.name}</span>
          <span class="desc">${d.desc}</span>
          <div class="tags">${tags}</div>
          <span class="arrow">查看範例 →</span>
        </div>`;
      return a;
    }

    // Distributed discovery: each demo PR adds only ./<no>/meta.json + ./<no>/index.html.
    // No shared manifest to merge — probe the fixed range and render whatever exists.
    const RANGE = Array.from({ length: 20 }, (_, k) => 41 + k);

    Promise.all(
      RANGE.map((no) =>
        fetch(`./${no}/meta.json`)
          .then((r) => (r.ok ? r.json() : null))
          .then((d) => (d ? { no, ...d } : null))
          .catch(() => null)
      )
    ).then((results) => {
      const demos = results.filter(Boolean).sort((a, b) => a.no - b.no);
      grid.innerHTML = '';
      if (!demos.length) {
        grid.innerHTML = '<div class="empty">範例陸續上線中。</div>';
        countEl.textContent = '';
        return;
      }
      demos.forEach((d, i) => grid.appendChild(card(d, i)));
      countEl.textContent = `共 ${demos.length} 種風格 · 持續擴充中`;
    });
  </script>
</body>
</html>
