<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Pulse Analytics — 數據營運儀表板</title>
<meta name="description" content="Pulse 是一款 SaaS 數據營運儀表板介面範例。深色霓虹資料視覺化、純手刻 SVG 圖表、KPI 卡片、可排序篩選表格與期間切換。後台管理介面範例頁面。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Pulse Analytics — SaaS data-ops dashboard (showcase #08)
   Aesthetic: premium dark "neon-on-charcoal" analytics product.
   Deep charcoal surfaces, electric-lime (#c8ff3d) primary accent
   + cyan (#38e8ff) secondary, soft glows, generous data-ink ratio.
   Plus Jakarta Sans for UI, IBM Plex Mono (tabular figures) for
   numbers, Noto Sans TC for CJK. All charts hand-built inline SVG
   with draw-in animation. Distinct from studio mint/indigo + Sora.
   ============================================================ */

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0c10;
  --bg-2:#0e1116;
  --surface:#13171e;
  --surface-2:#181d26;
  --line:#232a35;
  --line-soft:#1b212b;
  --text:#e8edf4;
  --text-2:#9aa6b6;
  --text-3:#5e6a7a;
  --accent:#c8ff3d;
  --accent-2:#38e8ff;
  --accent-3:#b794ff;
  --up:#39e0a0;
  --down:#ff6b81;
  --warn:#ffc857;
  --radius:16px;
  --radius-sm:11px;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 40px -18px rgba(0,0,0,.7);
  --glow:0 0 0 1px rgba(200,255,61,.18), 0 8px 30px -10px rgba(200,255,61,.18);
  --ui:"Plus Jakarta Sans","Noto Sans TC",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}

[data-theme="light"]{
  --bg:#f4f6fa;
  --bg-2:#eef1f7;
  --surface:#ffffff;
  --surface-2:#f7f9fc;
  --line:#e3e8f0;
  --line-soft:#edf1f7;
  --text:#161b22;
  --text-2:#5a6473;
  --text-3:#97a1b0;
  --accent:#5b8f00;
  --accent-2:#0090c8;
  --accent-3:#7c4dff;
  --up:#13a06a;
  --down:#e03b56;
  --shadow:0 1px 2px rgba(20,30,50,.04), 0 14px 38px -22px rgba(30,45,80,.22);
  --glow:0 0 0 1px rgba(91,143,0,.22), 0 10px 30px -14px rgba(91,143,0,.18);
}

html,body{height:100%}
body{
  font-family:var(--ui);
  background:
    radial-gradient(900px 500px at 100% -10%, rgba(56,232,255,.06), transparent 60%),
    radial-gradient(800px 480px at -5% 0%, rgba(200,255,61,.06), transparent 55%),
    var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  overflow-x:hidden;
}
[data-theme="light"] body{
  background:
    radial-gradient(900px 500px at 100% -10%, rgba(0,144,200,.07), transparent 60%),
    radial-gradient(800px 480px at -5% 0%, rgba(91,143,0,.07), transparent 55%),
    var(--bg);
}
a{color:inherit;text-decoration:none}
.tnum{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
::selection{background:var(--accent);color:#0a0c10}

/* ---------- Layout shell ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{
  position:sticky;top:0;align-self:start;height:100vh;
  display:flex;flex-direction:column;
  border-right:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg-2),var(--bg));
  padding:20px 14px;
  z-index:40;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex:none;
  background:conic-gradient(from 200deg,var(--accent),var(--accent-2),var(--accent-3),var(--accent));
  display:grid;place-items:center;color:#0a0c10;font-weight:800;
  box-shadow:0 6px 18px -6px rgba(200,255,61,.5);
}
.brand-mark svg{width:18px;height:18px}
.brand-name{font-weight:800;font-size:16px;letter-spacing:-.2px}
.brand-sub{font-size:11px;color:var(--text-3);font-family:var(--mono);letter-spacing:.5px}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.nav-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);padding:14px 10px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 11px;border-radius:10px;color:var(--text-2);
  font-size:13.5px;font-weight:500;cursor:pointer;
  border:1px solid transparent;transition:.16s;
}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.85}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(200,255,61,.14),rgba(200,255,61,.03));
  color:var(--text);border-color:rgba(200,255,61,.22);
}
.nav-item.active svg{color:var(--accent);opacity:1}
.nav-item .badge{margin-left:auto;font-size:10.5px;font-family:var(--mono);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--text-2)}
.nav-item.active .badge{border-color:rgba(200,255,61,.3);color:var(--accent)}
.side-foot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid var(--line-soft)}
.side-user{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent-3),var(--accent-2));display:grid;place-items:center;color:#0a0c10;font-weight:700;font-size:13px;flex:none}
.side-user .meta{min-width:0}
.side-user .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-user .rl{font-size:11px;color:var(--text-3)}

/* ---------- Main ---------- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:16px;
  padding:16px 28px;
  background:color-mix(in srgb,var(--bg) 78%, transparent);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.menu-btn{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;align-items:center;justify-content:center}
.menu-btn svg{width:18px;height:18px}
.page-title h1{font-size:19px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 0 0 rgba(57,224,160,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(57,224,160,.5)}70%{box-shadow:0 0 0 7px rgba(57,224,160,0)}100%{box-shadow:0 0 0 0 rgba(57,224,160,0)}}
.page-title p{font-size:12.5px;color:var(--text-3);margin-top:1px}
.topbar .spacer{flex:1}
.search{
  position:relative;width:240px;max-width:38vw;
}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-3)}
.search input{
  width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px 9px 34px;color:var(--text);font:inherit;font-size:13px;outline:none;transition:.16s;
}
.search input::placeholder{color:var(--text-3)}
.search input:focus{border-color:rgba(200,255,61,.4);box-shadow:0 0 0 3px rgba(200,255,61,.1)}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  color:var(--text-2);cursor:pointer;display:grid;place-items:center;position:relative;transition:.16s;flex:none;
}
.icon-btn:hover{color:var(--text);border-color:var(--line)}
.icon-btn svg{width:17px;height:17px}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:6px;height:6px;border-radius:50%;background:var(--down);border:2px solid var(--surface)}

.content{padding:24px 28px 40px;display:flex;flex-direction:column;gap:22px}

/* ---------- Period toggle ---------- */
.toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px}
.seg button{
  border:0;background:transparent;color:var(--text-2);font:inherit;font-weight:600;font-size:13px;
  padding:7px 15px;border-radius:8px;cursor:pointer;transition:.16s;
}
.seg button:hover{color:var(--text)}
.seg button.active{background:var(--accent);color:#0a0c10;box-shadow:0 4px 14px -6px rgba(200,255,61,.6)}
[data-theme="light"] .seg button.active{color:#fff}
.toolbar .right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:7px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;
  padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text);transition:.16s;
}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--line);background:var(--surface-2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0a0c10}
[data-theme="light"] .btn.primary{color:#fff}
.btn.primary:hover{filter:brightness(1.05)}

/* ---------- KPI cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{
  background:linear-gradient(180deg,var(--surface),var(--surface));
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px;position:relative;overflow:hidden;
}
.kpi .kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:12.5px;color:var(--text-2);font-weight:600;display:flex;align-items:center;gap:8px}
.kpi-ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--line)}
.kpi-ico svg{width:16px;height:16px;color:var(--accent)}
.kpi:nth-child(2) .kpi-ico svg{color:var(--accent-2)}
.kpi:nth-child(3) .kpi-ico svg{color:var(--accent-3)}
.kpi:nth-child(4) .kpi-ico svg{color:var(--warn)}
.kpi-val{font-size:29px;font-weight:600;margin-top:14px;letter-spacing:-1px;line-height:1}
.kpi-row{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
.delta{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 7px;border-radius:999px}
.delta.up{color:var(--up);background:color-mix(in srgb,var(--up) 14%, transparent)}
.delta.down{color:var(--down);background:color-mix(in srgb,var(--down) 14%, transparent)}
.delta svg{width:11px;height:11px}
.kpi-since{font-size:11.5px;color:var(--text-3)}
.kpi-row{padding-right:84px}
.spark{position:absolute;right:14px;bottom:14px;width:74px;height:28px;opacity:.9}

/* ---------- chart grid ---------- */
.grid-2{display:grid;grid-template-columns:1.7fr 1fr;gap:16px}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:12px}
.card-h h3{font-size:15px;font-weight:700;letter-spacing:-.2px}
.card-h p{font-size:12px;color:var(--text-3);margin-top:2px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:2px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-2);font-weight:500}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
.big-num{font-family:var(--mono);font-size:24px;font-weight:600;letter-spacing:-.5px}

/* ---------- line/area chart ---------- */
.chart-wrap{position:relative;margin-top:14px}
.line-svg{width:100%;height:auto;display:block;overflow:visible}
.grid-line{stroke:var(--line-soft);stroke-width:1}
.area-path{opacity:0;animation:fadeArea .9s ease .5s forwards}
@keyframes fadeArea{to{opacity:1}}
.line-path{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:var(--len);stroke-dashoffset:var(--len);animation:draw 1.4s cubic-bezier(.6,.05,.2,1) forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.dot{fill:var(--bg);stroke-width:2.5;cursor:pointer;opacity:0;animation:fadeArea .4s ease 1.2s forwards}
.axis-x{font-family:var(--mono);font-size:10.5px;fill:var(--text-3)}
.axis-y{font-family:var(--mono);font-size:10.5px;fill:var(--text-3)}

/* ---------- donut ---------- */
.donut-wrap{display:flex;align-items:center;gap:18px;margin-top:14px}
.donut-svg{flex:none}
.donut-seg{fill:none;stroke-width:18;stroke-linecap:round;
  stroke-dasharray:var(--c);stroke-dashoffset:var(--c);animation:draw 1.3s cubic-bezier(.6,.05,.2,1) forwards;transition:stroke-width .2s}
.donut-seg:hover{stroke-width:21}
.donut-center{font-family:var(--mono);font-weight:600}
.donut-legend{display:flex;flex-direction:column;gap:11px;flex:1;min-width:0}
.dl-row{display:flex;align-items:center;gap:9px;cursor:default}
.dl-row i{width:9px;height:9px;border-radius:3px;flex:none}
.dl-row .nm{font-size:12.5px;color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-row .vl{font-family:var(--mono);font-size:12.5px;font-weight:600}

/* ---------- bar chart ---------- */
.bars{display:flex;align-items:flex-end;gap:10px;height:180px;margin-top:18px;padding-bottom:22px;position:relative}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;cursor:pointer}
.bar{width:62%;max-width:34px;border-radius:7px 7px 3px 3px;
  background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 45%, var(--surface)));
  height:0;transition:height 1s cubic-bezier(.6,.05,.2,1),filter .15s;align-self:center}
.bar.alt{background:linear-gradient(180deg,var(--accent-2),color-mix(in srgb,var(--accent-2) 45%, var(--surface)))}
.bar-col:hover .bar{filter:brightness(1.12)}
.bar-x{position:absolute;bottom:-20px;font-family:var(--mono);font-size:10.5px;color:var(--text-3);white-space:nowrap}

/* ---------- tooltip ---------- */
.tip{
  position:fixed;z-index:200;pointer-events:none;opacity:0;transform:translate(-50%,-118%);
  background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  padding:8px 11px;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);transition:opacity .12s;white-space:nowrap;
}
.tip.on{opacity:1}
.tip .t-lbl{font-size:11px;color:var(--text-3);margin-bottom:3px}
.tip .t-val{font-family:var(--mono);font-size:14px;font-weight:600}
.tip .t-val b{color:var(--accent)}

/* ---------- table ---------- */
.table-card{padding:0;overflow:hidden}
.table-top{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.table-top h3{font-size:15px;font-weight:700}
.table-search{position:relative;margin-left:auto}
.table-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-3)}
.table-search input{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 12px 8px 31px;color:var(--text);font:inherit;font-size:12.5px;outline:none;width:200px;transition:.16s}
.table-search input:focus{border-color:rgba(200,255,61,.4);box-shadow:0 0 0 3px rgba(200,255,61,.1)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{
  text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:600;
  padding:11px 18px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap;transition:.15s;
}
thead th:hover{color:var(--text)}
thead th .arr{display:inline-block;width:9px;margin-left:5px;opacity:.4;transition:.15s}
thead th.sorted .arr{opacity:1;color:var(--accent)}
thead th.num,tbody td.num{text-align:right;font-family:var(--mono)}
tbody td{padding:13px 18px;border-bottom:1px solid var(--line-soft);font-size:13px;color:var(--text)}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:0}
.cell-prod{display:flex;align-items:center;gap:10px}
.prod-ico{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;color:#0a0c10}
.cell-sub{font-size:11px;color:var(--text-3)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;font-family:var(--mono)}
.pill::before{content:"";width:6px;height:6px;border-radius:50%}
.pill.ok{color:var(--up);background:color-mix(in srgb,var(--up) 13%, transparent)}
.pill.ok::before{background:var(--up)}
.pill.pend{color:var(--warn);background:color-mix(in srgb,var(--warn) 14%, transparent)}
.pill.pend::before{background:var(--warn)}
.pill.fail{color:var(--down);background:color-mix(in srgb,var(--down) 13%, transparent)}
.pill.fail::before{background:var(--down)}
.empty{padding:34px;text-align:center;color:var(--text-3);font-size:13px}

/* ---------- footer credit ---------- */
.foot{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  padding:18px 0 4px;border-top:1px solid var(--line-soft);color:var(--text-3);font-size:12px}
.credit a{color:var(--text-2);font-weight:600;border-bottom:1px dashed var(--line)}
.credit a:hover{color:var(--accent);border-color:var(--accent)}

/* ---------- responsive ---------- */
.scrim{display:none}
@media(max-width:980px){
  .grid-2{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:264px;transform:translateX(-105%);transition:transform .28s cubic-bezier(.6,.05,.2,1);box-shadow:0 0 60px rgba(0,0,0,.6)}
  body.nav-open .sidebar{transform:translateX(0)}
  body.nav-open .scrim{display:block;position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
  .menu-btn{display:flex}
  .content{padding:18px 16px 36px}
  .topbar{padding:13px 16px}
  .search{display:none}
  .kpis{grid-template-columns:1fr 1fr;gap:12px}
  .kpi-val{font-size:25px}
  .page-title p{display:none}
}
@media(max-width:430px){
  .kpis{grid-template-columns:1fr}
  .table-search input{width:140px}
  .spark{display:none}
  .kpi-row{padding-right:0}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001s!important;transition-duration:.001s!important}
}
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>
<div class="app">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
      </div>
      <div>
        <div class="brand-name">Pulse</div>
        <div class="brand-sub">ANALYTICS</div>
      </div>
    </div>

    <nav class="nav" id="nav">
      <div class="nav-label">總覽</div>
      <div class="nav-item active" data-view="總覽">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        儀表板
      </div>
      <div class="nav-item" data-view="營收分析">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        營收分析

const tip=$("#tip");
function showTip(x,y,lbl,val){
  tip.querySelector(".t-lbl").textContent=lbl;
  tip.querySelector(".t-val").innerHTML=val;
  tip.style.left=x+"px";tip.style.top=y+"px";tip.classList.add("on");

function hideTip(){tip.classList.remove("on");}

/* ---------- count-up ---------- */
function countUp(el,target,opts){
  const{money,pct}=opts||{};
  const dur=900,start=performance.now();
  function frame(t){
    let p=Math.min((t-start)/dur,1);
    p=1-Math.pow(1-p,3);
    const cur=target*p;
    el.textContent=render(cur);
    if(p<1)requestAnimationFrame(frame);else el.textContent=render(target);
  }
  function render(n){
    if(pct)return n.toFixed(2)+"%";
    if(money)return "NT$"+fmt(Math.round(n));
    return fmt(Math.round(n));
  }
  requestAnimationFrame(frame);
}

/* ---------- KPI render ---------- */
function renderKPIs(d){
  const wrap=$("#kpis");wrap.innerHTML="";
  d.kpis.forEach((k,i)=>{
    const meta=KPI_META[i];
    const diff=k.v-k.pre, up=diff>=0;
    const pctChg=(Math.abs(diff)/k.pre*100).toFixed(1);
    const card=document.createElement("div");
    card.className="card kpi";
    card.innerHTML=`
      <div class="kpi-top">
        <div class="kpi-label"><span class="kpi-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${meta.ico}</svg></span>${meta.label}</div>
      </div>
      <div class="kpi-val tnum" data-v="${k.v}"></div>
      <div class="kpi-row">
        <span class="delta ${up?'up':'down'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${up?'<path d="M6 15l6-6 6 6"/>':'<path d="M6 9l6 6 6-6"/>'}</svg>
          ${pctChg}%
        </span>
        <span class="kpi-since">較上期</span>
      </div>
      <svg class="spark" viewBox="0 0 78 30" preserveAspectRatio="none">${sparkPath(d.line.cur,up)}</svg>`;
    wrap.appendChild(card);
    countUp(card.querySelector(".kpi-val"),k.v,{money:k.money,pct:k.pct});
  });
}
function sparkPath(arr,up){
  const mx=Math.max(...arr),mn=Math.min(...arr),rng=mx-mn||1;
  const pts=arr.map((v,i)=>[i/(arr.length-1)*78,28-((v-mn)/rng)*26]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const col=up?"var(--up)":"var(--down)";
  return `<path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
}

/* ---------- line / area chart ---------- */
function renderLine(d){
  const W=560,H=240,padL=44,padR=14,padT=16,padB=28;
  const iw=W-padL-padR,ih=H-padT-padB;
  const cur=d.line.cur,pre=d.line.pre,xs=d.line.x;
  const max=Math.max(...cur,...pre)*1.08,min=0;
  const sx=i=>padL+i/(cur.length-1)*iw;
  const sy=v=>padT+ih-((v-min)/(max-min))*ih;
  const yTicks=4;
  let grid="",ylab="";
  for(let t=0;t<=yTicks;t++){
    const y=padT+ih-(t/yTicks)*ih;
    const val=Math.round((min+(max-min)*t/yTicks)/100)*100;
    grid+=`<line class="grid-line" x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"/>`;
    ylab+=`<text class="axis-y" x="${padL-8}" y="${y+3.5}" text-anchor="end">${val>=1000?(val/1000)+"k":val}</text>`;
  }
  let xlab="";
  xs.forEach((lb,i)=>{if(lb)xlab+=`<text class="axis-x" x="${sx(i)}" y="${H-9}" text-anchor="middle">${lb}</text>`;});
  const linePts=arr=>arr.map((v,i)=>sx(i).toFixed(1)+","+sy(v).toFixed(1)).join(" ");
  const dCur="M"+linePts(cur).replace(/ /g," L");
  const dPre="M"+linePts(pre).replace(/ /g," L");
  const area=`M${sx(0)},${padT+ih} L`+linePts(cur).replace(/ /g," L")+` L${sx(cur.length-1)},${padT+ih} Z`;
  const lenCur=approxLen(cur,sx,sy),lenPre=approxLen(pre,sx,sy);
  const dots=cur.map((v,i)=>`<circle class="dot" cx="${sx(i).toFixed(1)}" cy="${sy(v).toFixed(1)}" r="4.5" stroke="var(--accent)" data-i="${i}"/>`).join("");
  $("#lineWrap").innerHTML=`
  <svg class="line-svg" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity=".26"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grid}${ylab}${xlab}
    <path class="area-path" d="${area}" fill="url(#areaG)"/>
    <path class="line-path" d="${dPre}" stroke="var(--accent-2)" style="--len:${lenPre};opacity:.55;stroke-dasharray:6 5;animation-delay:.15s"/>
    <path class="line-path" d="${dCur}" stroke="var(--accent)" style="--len:${lenCur}"/>
    ${dots}
  </svg>`;
  $$("#lineWrap .dot").forEach(c=>{
    c.addEventListener("mouseenter",e=>{
      const i=+c.dataset.i,r=c.getBoundingClientRect();
      c.setAttribute("r","6.5");
      showTip(r.left+r.width/2,r.top,xs[i]||("點 "+(i+1)),`<b>NT$${fmt(cur[i]*1000)}</b>`);
    });
    c.addEventListener("mouseleave",()=>{c.setAttribute("r","4.5");hideTip();});
  });
}
function approxLen(arr,sx,sy){
  let L=0;for(let i=1;i<arr.length;i++){L+=Math.hypot(sx(i)-sx(i-1),sy(arr[i])-sy(arr[i-1]));}
  return Math.ceil(L)+4;
}

/* ---------- donut ---------- */
function renderDonut(d){
  const svg=$("#donut"),legend=$("#donutLegend");
  const R=58,CIR=2*Math.PI*R,cx=74,cy=74;
  let off=0,parts="";
  const total=d.donut.reduce((s,x)=>s+x[1],0);
  d.donut.forEach((seg,i)=>{
    const frac=seg[1]/total,len=frac*CIR,gap=2.5;
    const dash=Math.max(len-gap,1);
    parts+=`<circle class="donut-seg" cx="${cx}" cy="${cy}" r="${R}" stroke="${DONUT_COLORS[i]}"
      stroke-dasharray="${dash} ${CIR-dash}" transform="rotate(${-90+off/CIR*360} ${cx} ${cy})"
      style="--c:${CIR};animation-delay:${.1+i*.12}s" data-i="${i}"/>`;
    off+=len;
  });
  svg.innerHTML=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line-soft)" stroke-width="18"/>
    ${parts}
    <text class="donut-center" x="${cx}" y="${cy-1}" text-anchor="middle" fill="var(--text)" font-size="23">100%</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" fill="var(--text-3)" font-size="10" font-family="var(--mono)">總工作階段</text>`;
  legend.innerHTML=d.donut.map((s,i)=>`
    <div class="dl-row"><i style="background:${DONUT_COLORS[i]}"></i>
      <span class="nm">${s[0]}</span>
      <span class="vl">${(s[1]/total*100).toFixed(0)}%</span>
    </div>`).join("");
  $$("#donut .donut-seg").forEach(c=>{
    c.addEventListener("mousemove",e=>{
      const i=+c.dataset.i;
      showTip(e.clientX,e.clientY-6,d.donut[i][0],`<b>${(d.donut[i][1]/total*100).toFixed(1)}%</b>`);
    });
    c.addEventListener("mouseleave",hideTip);
  });
}

/* ---------- funnel bars ---------- */
function renderFunnel(d){
  const wrap=$("#funnel");wrap.innerHTML="";
  d.funnel.forEach((f,i)=>{
    const col=document.createElement("div");
    col.className="bar-col";
    col.innerHTML=`<div class="bar ${i%2?'alt':''}"></div><span class="bar-x">${f[0]}</span>`;
    wrap.appendChild(col);
    const bar=col.querySelector(".bar");
    requestAnimationFrame(()=>{setTimeout(()=>{bar.style.height=f[1]+"%";},80+i*90);});
    col.addEventListener("mousemove",e=>showTip(e.clientX,e.clientY-6,f[0],`<b>${f[1]}%</b>`));
    col.addEventListener("mouseleave",hideTip);
  });
}

  {id:"#PL-4813",customer:"星和醫療",sub:"enterprise",plan:"企業旗艦",amount:118000,status:"已付款"},
  {id:"#PL-4812",customer:"輕旅行 App",sub:"team",plan:"團隊版",amount:18900,status:"失敗"}
];
const PROD_C=["var(--accent)","var(--accent-2)","var(--accent-3)","var(--warn)"];
const STATUS_CLS={"已付款":"ok","處理中":"pend","失敗":"fail"};
let sortKey="id",sortDir=1,filterText="";

function renderTable(){
  const body=$("#tblBody");
  let rows=ORDERS.filter(o=>{
    if(!filterText)return true;
    const t=filterText.toLowerCase();
    return (o.id+o.customer+o.plan+o.status).toLowerCase().includes(t);
  });
  rows.sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    if(typeof x==="number")return (x-y)*sortDir;
    return String(x).localeCompare(String(y),"zh-Hant")*sortDir;
  });
  if(!rows.length){body.innerHTML=`<tr><td colspan="5" class="empty">找不到符合「${filterText}」的訂單</td></tr>`;return;}
  body.innerHTML=rows.map(o=>{
    const c=PROD_C[o.customer.length%PROD_C.length];
    return `<tr>
      <td class="tnum" style="color:var(--text-2)">${o.id}</td>
      <td><div class="cell-prod">
        <span class="prod-ico" style="background:${c}">${o.customer[0]}</span>
        <div><div>${o.customer}</div><div class="cell-sub">${o.sub}</div></div>
      </div></td>
      <td>${o.plan}</td>
      <td class="num">NT$${fmt(o.amount)}</td>
      <td><span class="pill ${STATUS_CLS[o.status]}">${o.status}</span></td>
    </tr>`;
  }).join("");
}
function setSort(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}
  $$("#tblHead th").forEach(th=>{
    const on=th.dataset.key===sortKey;
    th.classList.toggle("sorted",on);
    th.querySelector(".arr").textContent=on?(sortDir>0?"↑":"↓"):"↕";
  });
  renderTable();
}

/* ---------- period switch ---------- */
function loadPeriod(p){
  const d=DATA[p];
  renderKPIs(d);
  renderLine(d);
  renderDonut(d);
  renderFunnel(d);
}

/* ---------- view (sidebar) switch ---------- */
const VIEW_SUB={
  "總覽":"即時監控 Pulse 平台營運表現 · 最後更新於剛剛",
  "營收分析":"深入分析各方案與通路的營收貢獻",
  "使用者":"追蹤活躍用戶、留存與行為輪廓",
  "訂單":"管理近期交易與付款狀態",
  "自動化":"設定資料同步與排程工作流程",
  "設定":"工作區偏好、成員與整合設定"
};
const VIEW_TITLE={"總覽":"儀表板總覽","營收分析":"營收分析","使用者":"使用者洞察","訂單":"訂單管理","自動化":"自動化","設定":"設定"};

function init(){
  // initial render
  loadPeriod("week");
  renderTable();
  setSort("id");

  // period toggle
  $("#periodSeg").addEventListener("click",e=>{
    const b=e.target.closest("button");if(!b)return;
    $$("#periodSeg button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    loadPeriod(b.dataset.p);
  });

  // table sort
  $("#tblHead").addEventListener("click",e=>{
    const th=e.target.closest("th");if(!th)return;setSort(th.dataset.key);
  });
  // table filter
  $("#tblSearch").addEventListener("input",e=>{filterText=e.target.value.trim();renderTable();});

  // sidebar nav
  $("#nav").addEventListener("click",e=>{
    const it=e.target.closest(".nav-item");if(!it)return;
    $$("#nav .nav-item").forEach(x=>x.classList.remove("active"));
    it.classList.add("active");
    const v=it.dataset.view;
    $("#viewTitle").textContent=VIEW_TITLE[v]||v;
    $("#viewSub").textContent=VIEW_SUB[v]||"";
    document.body.classList.remove("nav-open");
  });

  // mobile menu
  $("#menuBtn").addEventListener("click",()=>document.body.classList.toggle("nav-open"));
  $("#scrim").addEventListener("click",()=>document.body.classList.remove("nav-open"));

  // theme toggle
  $("#themeBtn").addEventListener("click",()=>{
    const html=document.documentElement;
    const dark=html.getAttribute("data-theme")==="dark";
    html.setAttribute("data-theme",dark?"light":"dark");
    $("#themeIco").innerHTML=dark
      ?'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
      :'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  });
}
if(document.readyState!=="loading")init();else document.addEventListener("DOMContentLoaded",init);
})();
</script>
</body>
</html>
