<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />

    <meta name="robots" content="noindex" />
    <title>設計範例 · 互動樣板展示 — e-life-ai</title>

      name="description"
      content="e-life-ai 設計範例：60+ 種產業情境與設計風格的互動式前端樣板，展示設計幅度與前端功力。"

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #070b10;
        --bg-1: #0b1117;
        --bg-2: #0f1620;
        --bg-3: #141d29;
        --line: #1d2733;
        --line-bright: #2a3a4d;
        --ink-0: #eaf2fb;
        --ink-1: #9fb2c6;
        --ink-2: #61748a;
        --accent: #34e3c4;
        --accent-2: #7c8cff;
        --font-display: 'Sora', 'Noto Sans TC', sans-serif;
        --font-mono: 'JetBrains Mono', 'Noto Sans TC', monospace;
        --font-cjk: 'Noto Sans TC', 'Sora', sans-serif;
        --gutter: clamp(20px, 5vw, 64px);
        --radius: 14px;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg-0);
        color: var(--ink-0);
        font-family: var(--font-cjk);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        position: relative;
        min-height: 100vh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 64px 64px;
        opacity: 0.25;
        mask-image: radial-gradient(circle at 50% 0%, #000 0%, transparent 70%);
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding-inline: var(--gutter);
        position: relative;
        z-index: 1;
      }
      header.top {
        padding-top: clamp(56px, 10vw, 110px);
        padding-bottom: clamp(40px, 6vw, 64px);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.6em;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.18rem;
        letter-spacing: -0.01em;
        text-decoration: none;
        color: var(--ink-0);
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 14px var(--accent);
      }
      .brand-ai {
        color: var(--accent);
      }
      .eyebrow {
        display: inline-block;
        margin-top: clamp(40px, 6vw, 64px);
        font-family: var(--font-mono);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        color: var(--accent);
      }
      h1 {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(2rem, 5vw, 3.2rem);
        letter-spacing: -0.025em;
        line-height: 1.08;
        margin-top: 14px;
      }
      .lead {
        color: var(--ink-1);
        max-width: 60ch;
        margin-top: 18px;
        font-size: 1.02rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(16px, 2vw, 22px);
        padding-bottom: clamp(56px, 9vw, 100px);
      }
      .card {
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: clamp(22px, 2.4vw, 30px);
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.4s var(--ease),
          transform 0.4s var(--ease);
      }
      .card::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--card-accent, var(--accent));
        transform: scaleY(0);
        transform-origin: top;
        transition: transform 0.5s var(--ease);
      }
      .card:hover {
        border-color: var(--line-bright);
        transform: translateY(-4px);
      }
      .card:hover::after {
        transform: scaleY(1);
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .no {
        font-family: var(--font-mono);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--card-accent, var(--accent));
      }
      .kind {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.04em;
        color: var(--ink-2);
        text-align: right;
      }
      .card-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(1.12rem, 1.8vw, 1.4rem);
        letter-spacing: -0.015em;
        margin-top: 18px;
        line-height: 1.25;
      }
      .view {
        margin-top: auto;
        padding-top: 26px;
        font-family: var(--font-mono);
        font-size: 0.82rem;
        color: var(--ink-1);
        display: inline-flex;
        align-items: center;
        gap: 0.5em;
        transition: color 0.3s var(--ease);
      }
      .card:hover .view {
        color: var(--card-accent, var(--accent));
      }
      .arrow {
        transition: transform 0.3s var(--ease);
      }
      .card:hover .arrow {
        transform: translate(2px, -2px);
      }
      footer.bottom {
        border-top: 1px solid var(--line);
        padding: clamp(28px, 4vw, 40px) 0 clamp(40px, 6vw, 60px);
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--ink-2);
      }
      footer.bottom a {
        color: var(--accent);
        text-decoration: none;
      }
      footer.bottom a:hover {
        text-decoration: underline;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

          使用模擬資料的展示範本（非真實客戶產品），點開即可實際操作。
        </p>
