<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#070b10" />
    <title>找不到頁面 · e-life-ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070b10;
        --fg: #e6edf3;
        --muted: #8a99a8;
        --mint: #34e3c4;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(52, 227, 196, 0.12), transparent 60%),
          var(--bg);
        color: var(--fg);
        font-family: 'Noto Sans TC', 'Sora', system-ui, sans-serif;
        text-align: center;
      }
      .wrap {
        max-width: 520px;
      }
      .code {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: clamp(72px, 18vw, 140px);
        line-height: 1;
        letter-spacing: 0.04em;
        background: linear-gradient(180deg, var(--mint), #1aa388);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      h1 {
        font-family: 'Sora', 'Noto Sans TC', sans-serif;
        font-weight: 700;
        font-size: clamp(20px, 5vw, 26px);
        margin: 12px 0 8px;
      }
      p {
        color: var(--muted);
        line-height: 1.7;
        margin: 0 0 28px;
      }
      .home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        color: #061310;
        background: var(--mint);
        box-shadow: 0 6px 20px rgba(52, 227, 196, 0.35);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .home:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 26px rgba(52, 227, 196, 0.5);
      }
      .brand {
        margin-top: 36px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .brand a {
        color: var(--mint);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="code">404</div>
      <h1>這個頁面不在這裡</h1>
      <p>你要找的內容可能已經搬家或不存在了。<br />讓我們帶你回到首頁。</p>
      <a class="home" href="/">
        回首頁
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
      </a>
      <div class="brand"><a href="/">e-life-ai</a> · 數位綠洲有限公司</div>
    </main>
  </body>
</html>
