<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 878" width="1080" height="878" role="img" aria-label="e-life.ai LINE 官方帳號封面">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e3c4"/>
      <stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0" stop-color="#13212e"/>
      <stop offset="0.55" stop-color="#0b131c"/>
      <stop offset="1" stop-color="#070b10"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34e3c4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#34e3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="878" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1d2733" stroke-width="1" opacity="0.30">
    <line x1="0" y1="200" x2="1080" y2="200"/>
    <line x1="0" y1="400" x2="1080" y2="400"/>
    <line x1="0" y1="600" x2="1080" y2="600"/>
    <line x1="270" y1="0" x2="270" y2="878"/>
    <line x1="540" y1="0" x2="540" y2="878"/>
    <line x1="810" y1="0" x2="810" y2="878"/>
  </g>

  <!-- scattered ambient nodes -->
  <g fill="#7c8cff" opacity="0.30">
    <circle cx="150" cy="150" r="4"/>
    <circle cx="930" cy="220" r="4"/>
    <circle cx="980" cy="640" r="4"/>
    <circle cx="120" cy="560" r="4"/>
  </g>
  <g stroke="#22303f" stroke-width="1.5" opacity="0.5">
    <line x1="150" y1="150" x2="360" y2="300"/>
    <line x1="930" y1="220" x2="720" y2="320"/>
  </g>

  <!-- center glow -->
  <ellipse cx="540" cy="350" rx="380" ry="300" fill="url(#halo)"/>

  <!-- big graph mark -->
  <g transform="translate(540 320)">
    <g stroke="url(#edge)" stroke-width="4" opacity="0.75" stroke-linecap="round">
      <line x1="0" y1="0" x2="-104" y2="-94"/>
      <line x1="0" y1="0" x2="112" y2="-74"/>
      <line x1="0" y1="0" x2="-86" y2="104"/>
      <line x1="0" y1="0" x2="96" y2="96"/>
      <line x1="-104" y1="-94" x2="112" y2="-74" opacity="0.4"/>
    </g>
    <circle cx="-104" cy="-94" r="15" fill="#7c8cff"/>
    <circle cx="112" cy="-74" r="15" fill="#7c8cff"/>
    <circle cx="-86" cy="104" r="15" fill="#7c8cff"/>
    <circle cx="96" cy="96" r="15" fill="#7c8cff"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#34e3c4" stroke-width="3" opacity="0.30"/>
    <circle cx="0" cy="0" r="28" fill="#34e3c4"/>
  </g>

  <!-- wordmark -->
  <text x="540" y="560" text-anchor="middle" font-family="Sora, 'Segoe UI', sans-serif" font-size="92" font-weight="800" letter-spacing="-2.5" fill="#eaf2fb">e-life<tspan fill="#34e3c4">.ai</tspan></text>

  <!-- tagline -->
  <text x="540" y="624" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="30" letter-spacing="2" fill="#8fa3b8">AI 自動化 · 爬蟲 · 網站與系統開發</text>

  <!-- divider -->
  <line x1="430" y1="668" x2="650" y2="668" stroke="#22303f" stroke-width="2"/>
  <text x="540" y="704" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" letter-spacing="3" fill="#34e3c4">FREELANCE · 接案開發</text>
</svg>
