<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 878" width="1080" height="878" role="img" aria-label="e-life-ai LINE 官方帳號封面">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e3c4"/>
      <stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0" stop-color="#13212e"/>
      <stop offset="0.55" stop-color="#0b131c"/>
      <stop offset="1" stop-color="#070b10"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34e3c4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#34e3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="878" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1d2733" stroke-width="1" opacity="0.30">
    <line x1="0" y1="160" x2="1080" y2="160"/>
    <line x1="0" y1="320" x2="1080" y2="320"/>
    <line x1="0" y1="480" x2="1080" y2="480"/>
    <line x1="270" y1="0" x2="270" y2="878"/>
    <line x1="540" y1="0" x2="540" y2="878"/>
    <line x1="810" y1="0" x2="810" y2="878"/>
  </g>

  <!-- scattered ambient nodes -->
  <g fill="#7c8cff" opacity="0.30">
    <circle cx="150" cy="120" r="4"/>
    <circle cx="930" cy="170" r="4"/>
    <circle cx="970" cy="430" r="4"/>
    <circle cx="120" cy="400" r="4"/>
  </g>
  <g stroke="#22303f" stroke-width="1.5" opacity="0.5">
    <line x1="150" y1="120" x2="350" y2="230"/>
    <line x1="930" y1="170" x2="710" y2="250"/>
  </g>

  <!-- center glow (upper) -->
  <ellipse cx="540" cy="240" rx="380" ry="260" fill="url(#halo)"/>

  <!-- big graph mark -->
  <g transform="translate(540 220)">
    <g stroke="url(#edge)" stroke-width="4" opacity="0.75" stroke-linecap="round">
      <line x1="0" y1="0" x2="-104" y2="-94"/>
      <line x1="0" y1="0" x2="112" y2="-74"/>
      <line x1="0" y1="0" x2="-86" y2="104"/>
      <line x1="0" y1="0" x2="96" y2="96"/>
      <line x1="-104" y1="-94" x2="112" y2="-74" opacity="0.4"/>
    </g>
    <circle cx="-104" cy="-94" r="15" fill="#7c8cff"/>
    <circle cx="112" cy="-74" r="15" fill="#7c8cff"/>
    <circle cx="-86" cy="104" r="15" fill="#7c8cff"/>
    <circle cx="96" cy="96" r="15" fill="#7c8cff"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#34e3c4" stroke-width="3" opacity="0.30"/>
    <circle cx="0" cy="0" r="28" fill="#34e3c4"/>
  </g>

  <!-- wordmark -->
  <text x="540" y="450" text-anchor="middle" font-family="Sora, 'Segoe UI', sans-serif" font-size="92" font-weight="800" letter-spacing="-2.5" fill="#eaf2fb">e-life<tspan fill="#34e3c4">-ai</tspan></text>

  <!-- tagline -->
  <text x="540" y="512" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="29" letter-spacing="2" fill="#8fa3b8">AI 自動化 · 爬蟲 · 網站與系統開發</text>

  <!-- divider + sub -->
  <line x1="440" y1="552" x2="640" y2="552" stroke="#22303f" stroke-width="2"/>
  <text x="540" y="588" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="23" letter-spacing="3" fill="#34e3c4">FREELANCE · 接案開發</text>

  <!-- lower safe zone for LINE avatar + account name (intentionally empty below y~610) -->
</svg>
