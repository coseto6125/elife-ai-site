<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="網站與後台系統開發">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e3c4"/>
      <stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="34%" r="75%">
      <stop offset="0" stop-color="#12202c"/>
      <stop offset="0.55" stop-color="#0b131c"/>
      <stop offset="1" stop-color="#070b10"/>
    </radialGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1620"/>
      <stop offset="1" stop-color="#0a121b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <g stroke="#1d2733" stroke-width="1" opacity="0.35">
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="675" x2="1200" y2="675"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
  </g>

  <!-- stacked backend layers behind -->
  <g transform="translate(600 360)">
    <rect x="-210" y="-130" width="420" height="260" rx="18" fill="#0c1119" stroke="#1d2733" opacity="0.5" transform="translate(36 36)"/>
    <rect x="-210" y="-130" width="420" height="260" rx="18" fill="#0c1119" stroke="#1d2733" opacity="0.75" transform="translate(18 18)"/>

    <!-- browser window front -->
    <rect x="-210" y="-130" width="420" height="260" rx="18" fill="url(#win)" stroke="#22303f" stroke-width="2"/>
    <!-- top bar -->
    <path d="M -210 -112 Q -210 -130 -192 -130 L 192 -130 Q 210 -130 210 -112 L 210 -88 L -210 -88 Z" fill="#0b121a"/>
    <circle cx="-184" cy="-109" r="6" fill="#7c8cff"/>
    <circle cx="-162" cy="-109" r="6" fill="#34e3c4"/>
    <circle cx="-140" cy="-109" r="6" fill="#2a3a4a"/>
    <rect x="-118" y="-117" width="220" height="16" rx="8" fill="#131d28"/>
    <line x1="-210" y1="-88" x2="210" y2="-88" stroke="#22303f" stroke-width="2"/>

    <!-- content: graph mark + code lines -->
    <g transform="translate(-110 8)">
      <g stroke="url(#edge)" stroke-width="2.4" opacity="0.7" stroke-linecap="round">
        <line x1="0" y1="0" x2="-44" y2="-32"/>
        <line x1="0" y1="0" x2="46" y2="-26"/>
        <line x1="0" y1="0" x2="-34" y2="40"/>
        <line x1="0" y1="0" x2="40" y2="38"/>
      </g>
      <circle cx="-44" cy="-32" r="7" fill="#7c8cff"/>
      <circle cx="46" cy="-26" r="7" fill="#7c8cff"/>
      <circle cx="-34" cy="40" r="7" fill="#7c8cff"/>
      <circle cx="40" cy="38" r="7" fill="#7c8cff"/>
      <circle cx="0" cy="0" r="11" fill="#34e3c4"/>
    </g>
    <g transform="translate(40 -34)" fill="#1f2c3a">
      <rect x="0" y="0" width="150" height="13" rx="6.5"/>
      <rect x="0" y="26" width="120" height="13" rx="6.5"/>
      <rect x="0" y="52" width="150" height="13" rx="6.5" fill="#34e3c4" opacity="0.5"/>
      <rect x="0" y="78" width="96" height="13" rx="6.5"/>
    </g>
  </g>

  <text x="80" y="700" font-family="Sora, 'Segoe UI', sans-serif" font-size="64" font-weight="800" letter-spacing="-1.5" fill="#eaf2fb">網站<tspan fill="#34e3c4">與</tspan>後台系統開發</text>
  <text x="82" y="752" font-family="'JetBrains Mono', monospace" font-size="27" fill="#61748a">frontend · backend · 客製化系統</text>

  <g transform="translate(80 818)">
    <g transform="translate(20 0)">
      <g stroke="url(#edge)" stroke-width="2" opacity="0.7">
        <line x1="0" y1="0" x2="-13" y2="-12"/>
        <line x1="0" y1="0" x2="14" y2="-10"/>
        <line x1="0" y1="0" x2="-11" y2="13"/>
        <line x1="0" y1="0" x2="12" y2="12"/>
      </g>
      <circle cx="-13" cy="-12" r="2.6" fill="#7c8cff"/>
      <circle cx="14" cy="-10" r="2.6" fill="#7c8cff"/>
      <circle cx="-11" cy="13" r="2.6" fill="#7c8cff"/>
      <circle cx="12" cy="12" r="2.6" fill="#7c8cff"/>
      <circle cx="0" cy="0" r="4.4" fill="#34e3c4"/>
    </g>
    <text x="48" y="9" font-family="Sora, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="-0.8" fill="#eaf2fb">e-life<tspan fill="#34e3c4">-ai</tspan></text>
  </g>

  <g transform="translate(1120 70)">
    <rect x="-150" y="-26" width="150" height="44" rx="22" fill="#0f1620" stroke="#22303f"/>
    <text x="-75" y="4" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#34e3c4">WEB · APP</text>
  </g>
</svg>
