name = "elife-ai-contact"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Email Routing send binding — destination MUST be a verified address.
# digital.oasis.tw@gmail.com is the verified destination on this account.
[[send_email]]
name = "SEND_EMAIL"
destination_address = "digital.oasis.tw@gmail.com"

# 提案瀏覽追蹤用 KV。建立：
#   cd worker && npx wrangler kv namespace create VIEWS
# 把回傳的 id 填入下方，再 ./deploy.sh
[[kv_namespaces]]
binding = "VIEWS"
id = "20aa173efce248988431146d0dc666aa"
